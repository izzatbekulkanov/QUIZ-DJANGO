{% load static %}
<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ system.name|default:"Quiz Platform" }} - Dashboard</title>
  <meta name="description" content="Quiz platforma bosh sahifasi">

  <link rel="shortcut icon" href="{% static 'assets/media/favicons/favicon.png' %}">
  <link rel="icon" type="image/png" sizes="192x192" href="{% static 'assets/media/favicons/favicon-192x192.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'assets/media/favicons/apple-touch-icon-180x180.png' %}">

  <link rel="stylesheet" id="css-main" href="{% static 'assets/css/oneui.min.css' %}">
  <link rel="stylesheet" id="css-theme" href="{% static 'assets/css/themes/modern.min.css' %}">
  {% block style %}{% endblock style %}
</head>
<body>
  <div id="page-container">
    <main id="main-container" class="bg-body-extra-light">
      <div class="content content-full py-4">
        <div class="row g-4 align-items-start">
          <div class="col-12 col-xl-3">
            {% include 'dashboard/components/home_side_menu.html' %}
          </div>
          <div class="col-12 col-xl-9">
            {% block content %}{% endblock content %}
          </div>
        </div>
      </div>
    </main>

    {% include 'dashboard/components/footer.html' %}
  </div>

  <script src="{% static 'assets/js/oneui.app.min.js' %}"></script>
  {% block script %}{% endblock script %}
</body>
</html>
